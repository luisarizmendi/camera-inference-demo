# MediaMTX minimal configuration
# All ports are patched at container startup by entrypoint.sh using env vars:
#   RTSP_PORT          (default: 8554)  - RTSP TCP listener
#   RTSP_PORT_RTP      (default: 8000)  - RTSP UDP/RTP listener
#   RTSP_PORT_RTCP     (default: 8001)  - RTSP UDP/RTCP listener
#   RTSP_PORT_HLS      (default: 8888)  - HLS web player
#   RTSP_PORT_WEBRTC   (default: 8889)  - WebRTC web player
#   RTSP_PORT_ICE_UDP  (default: 8189)  - WebRTC ICE UDP mux
#   RTSP_PORT_SRT      (default: 8890)  - SRT
#   RTSP_PORT_RTMP     (default: 1935)  - RTMP

rtspAddress:            :8554
rtpAddress:             :8000
rtcpAddress:            :8001
rtmpAddress:            :1935
hlsAddress:             :8888
webRTCAddress:          :8889
srtAddress:             :8890
webRTCICEUDPMuxAddress: :8189

# Set this to the LAN IP of the host running the container so that browsers
# on the same network can reach the server for WebRTC.
# Override at runtime with: -e MTX_WEBRTCADDITIONALHOSTS=192.168.1.41
webRTCAdditionalHosts: []

# No authentication
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:

paths:
  all_others:
    # Always live — no recording or server-side seek
    record: no